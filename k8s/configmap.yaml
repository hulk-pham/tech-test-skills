apiVersion: v1
kind: ConfigMap
metadata:
  name: metrics-api-config
data:
  PORT: "3000"
  TYPEORM_SYNC: "false"
  TYPEORM_MIGRATIONS_RUN: "true"
  RATE_LIMIT_ENABLED: "true"
  RATE_LIMIT_TTL_MS: "60000"
  RATE_LIMIT_MAX: "100"
  # REDIS_URL bỏ trống hoặc set qua Secret nếu dùng cache chart
  REDIS_URL: ""
