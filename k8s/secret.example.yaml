# Sao chép thành secret.yaml và áp dụng (cùng namespace metrics):
#   kubectl apply -f k8s/secret.yaml
# DATABASE_URL phải khớp postgres-secret trong k8s/postgres.yaml (user/password/DB).
# Không commit secret thật lên git.
apiVersion: v1
kind: Secret
metadata:
  name: metrics-api-secret
  namespace: metrics
type: Opaque
stringData:
  DATABASE_URL: "postgres://user:password@postgres-service:5432/metrics"
  REDIS_URL: "redis://redis-service:6379"
